{% extends "base.html" %}

{% block title %}Forgot Password - Candles{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1>Forgot Password?</h1>

        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="email">Enter your email address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <p class="form-help">We'll send you a link to reset your password.</p>

            <button type="submit" class="btn btn-primary full-width">Send Reset Link</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('signin') }}">Back to Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
