{% extends "base.html" %}

{% block title %}Sign Up - Candles{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box wide">
        <h1>Create an Account</h1>
        <p>Create an account to access the best of your favorite store</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="confirm_email">Confirm Email *</label>
                    <input type="email" id="confirm_email" name="confirm_email" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="birthday">Birthday</label>
                    <input type="date" id="birthday" name="birthday" placeholder="dd-mm-yyyy">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="zipcode">Zip/Postal Code *</label>
                    <input type="text" id="zipcode" name="zipcode" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Phone *</label>
                    <input type="tel" id="phone" name="phone" placeholder="Example: 9234567890" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="confirm_password">Confirm Password *</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="privacy" name="privacy" required>
                <label for="privacy">I agree to the <a href="#">Privacy Policy</a></label>
            </div>

            <button type="submit" class="btn btn-primary full-width">Create Account</button>
        </form>

        <div class="auth-links">
            Already have an account? <a href="{{ url_for('signin') }}">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
